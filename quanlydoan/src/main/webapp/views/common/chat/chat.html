<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div th:fragment="chatContains">

    <div class="chatroom-container container-fluid">
        <div class="col-12 d-flex flex-column chat-wrapper">
                <!-- MESSAGE LIST -->
                <input type="hidden" th:value="${semesterTeacherId}" id="semesterTeacherId">
                <div class="chat-body" id="chatBody">
                    <!-- MESSAGE (MÌNH) -->
                    <div class="chat-item my">
                        <img src="avatar-user.jpg" class="avatar">
                        <div class="bubble">
                            <div class="meta">
                                <span class="name">Bạn</span>
                                <span class="time">10:30</span>
                            </div>
                            <div class="content">Xin chào mọi người 👋</div>
                        </div>
                    </div>
                    <!-- MESSAGE (NGƯỜI KHÁC) -->
                    <div class="chat-item other">
                        <img src="avatar2.jpg" class="avatar">
                        <div class="bubble">
                            <div class="meta">
                                <span class="name">Nguyễn Văn B</span>
                                <span class="time">10:32</span>
                            </div>
                            <div class="content">Chào bạn nhé!</div>
                        </div>
                    </div>
                    <!-- IMAGE -->
                    <div class="chat-item my">
                        <img src="avatar-user.jpg" class="avatar">
                        <div class="bubble">
                            <div class="meta">
                                <span class="name">Bạn</span>
                                <span class="time">10:33</span>
                            </div>
                            <img src="image.jpg" class="chat-img">
                        </div>
                    </div>
                </div>
                <div class="chat-footer">
                    <textarea id="editorChat"></textarea>
                    <button onclick="chatAction()" class="btn btn-primary btn-send">
                        <i class="fa fa-paper-plane"></i> Gửi
                    </button>
                </div>
            </div>
    </div>

    <script>
        tinymce.init({
            selector: 'textarea#editorChat', // Chọn textarea có id là 'editor'
            plugins: 'advlist autolink lists link image charmap print preview hr anchor pagebreak ' +
                'searchreplace wordcount visualblocks visualchars code fullscreen insertdatetime media nonbreaking ' +
                'table emoticons template paste codesample help',
            toolbar: 'uploadfile | undo redo | blocks | ' + // Hoàn tác, làm lại, và định dạng khối (Heading 1, 2, Paragraph,...)
                'bold italic underline strikethrough | forecolor backcolor | ' + // Định dạng chữ: đậm, nghiêng, gạch chân, gạch ngang, màu chữ, màu nền
                'alignleft aligncenter alignright alignjustify | outdent indent | ' + // Căn lề, lùi dòng
                'numlist bullist | link image media table | ' + // Danh sách số, danh sách dấu chấm, chèn liên kết, ảnh, video, bảng
                'charmap emoticons | fullscreen code preview | help', // Ký tự đặc biệt, biểu tượng cảm xúc, chế độ toàn màn hình, xem trước, mã nguồn, trợ giúp
            height: 200, // Tăng chiều cao của trình soạn thảo
            menubar: 'file edit view insert format tools table help ', // Hiện thêm menu bar ở trên cùng
            images_upload_handler: async function (blobInfo, success, failure) {
                const formData = new FormData();
                formData.append('file', blobInfo.blob(), blobInfo.filename());

                const res = await fetch('http://localhost:8080/api/public/upload-file', {
                    method: 'POST',
                    body: formData
                });
                if (res.status < 300) {
                    var linkImage = await res.text();
                    success(linkImage);
                }
            },
            setup: function (editor) {
                editor.ui.registry.addButton('uploadfile', {
                    text: 'File',
                    icon: 'upload',
                    onAction: function () {

                        const input = document.createElement('input');
                        input.type = 'file';

                        input.onchange = async function () {
                            const file = input.files[0];

                            const formData = new FormData();
                            formData.append('file', file);

                            const res = await fetch('http://localhost:8080/api/public/upload-file', {
                                method: 'POST',
                                body: formData
                            });

                            if (res.status < 300) {
                                const fileUrl = await res.text();

                                editor.insertContent(
                                    `<p>📎 <a href="${fileUrl}" target="_blank">${file.name}</a></p>`
                                );
                            }
                        };

                        input.click();
                    }
                });
            }
        });
    </script>
    <script>
        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                stompClient.subscribe(`/topic/chat-room/${$("#semesterTeacherId").val()}`, function (notification) {
                    console.log(notification)
                });
            }, function (error) {
                console.error('Connection failed:', error);
                setTimeout(connect, 5000); // Tự động kết nối lại sau 5 giây
            });
        }
        connect();

        async function chatAction(){
            var mess = tinyMCE.get('editorChat').getContent()
            var idSemesterTeacher = document.getElementById("semesterTeacherId").value
            stompClient.send("/topic/chat-room/"+idSemesterTeacher, {}, mess);
        }
    </script>
</div>
</body>
</html>
