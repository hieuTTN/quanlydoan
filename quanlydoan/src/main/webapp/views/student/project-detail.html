<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:include="common/user/libuser :: libheader"></th:block>
</head>
<body>
<div th:replace="common/user/headerUser :: headerUser"></div>
<div class="account-layout content-page-main">
  <div th:replace="common/user/sidebarUser :: sidebarMain"></div>
  <div class="account-content">
    <div class="account-content-inner">
      <div class="account-tabs-containers">
        <div class="account-tabs">
          <div class="account-tab active" data-tab="tab1">Đoạn chat chung</div>
          <div class="account-tab" data-tab="tab2">Báo cáo tiến độ</div>
          <div class="account-tab" data-tab="tab3">Nộp giấy tờ</div>
          <div class="account-tab" data-tab="tab4">File</div>
          <div class="account-tab" data-tab="tab5">Đánh giá</div>
          <div class="account-tab-indicator"></div>
        </div>
        <div class="account-tab-content">
          <div class="account-tab-pane active" id="tab1">
            Nội dung tổng quan
          </div>
          <div class="account-tab-pane" id="tab2">
            Nội dung đồ án
          </div>
          <div class="account-tab-pane" id="tab3">
            Nội dung báo cáo
          </div>
          <div class="account-tab-pane" id="tab4">
            Nội dung đánh giá
          </div>
          <div class="account-tab-pane" id="tab5">
            Nội dung tài liệu
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="common/user/footeruser :: footerMain"></div>
<script>
  const tabs=document.querySelectorAll(".account-tab");
  const panes=document.querySelectorAll(".account-tab-pane");
  const indicator=document.querySelector(".account-tab-indicator");

  function moveIndicator(tab){
    indicator.style.width=tab.offsetWidth+"px";
    indicator.style.left=tab.offsetLeft+"px";
  }

  tabs.forEach(tab=>{
    tab.addEventListener("click",function(){

      tabs.forEach(t=>t.classList.remove("active"));
      panes.forEach(p=>p.classList.remove("active"));

      this.classList.add("active");

      document.getElementById(this.dataset.tab).classList.add("active");

      moveIndicator(this);

    });
  });

  moveIndicator(document.querySelector(".account-tab.active"));
</script>
</body>
</html>
