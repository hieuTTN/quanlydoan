<!DOCTYPE html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<div th:fragment="work">
    <div class="teacher-work-wrapper">

        <div class="teacher-work-header d-flex justify-content-between align-items-center mb-4">
            <button data-bs-toggle="modal" data-bs-target="#modal-add-word" class="btn teacher-work-btn-add">
                <i class="bi bi-plus-circle"></i> Thêm yêu cầu cập nhật tiến độ mới
            </button>
        </div>

        <div class="teacher-work-group">
            <h6 class="teacher-work-date">Thứ Ba, ngày 22/04/25</h6>

            <div class="teacher-work-card">
                <div class="teacher-work-content">
                    <h6 class="teacher-work-name">Bài tập với String</h6>
                    <p class="mb-1">Mã bài tập: <b>5</b></p>
                    <p class="mb-1">Hạn cuối lúc: <b>22:00</b></p>
                    <small>Số testcase: 0</small>
                </div>

                <div class="teacher-work-actions">
                    <span class="teacher-work-badge expired">Hết hạn</span>

                    <div class="teacher-work-btn-group">
                        <button class="btn btn-warning"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-danger"><i class="bi bi-x"></i></button>
                        <button class="btn btn-danger"><i class="bi bi-trash"></i></button>
                        <button class="btn btn-warning"><i class="bi bi-box"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-add-word" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Thêm tiến độ công việc</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div>
                        <input class="form-control" id="semesterTeacherId" th:value="${semesterTeacherId}" type="hidden">
                        <input class="form-control" id="idwork" type="hidden">
                        <div class="form-floating form-add-user">
                            <input class="form-control" id="work-title" placeholder="Tiêu đề">
                            <label>Tiêu đề</label>
                        </div>
                        <div class="form-floating form-add-user mt-4">
                            <input class="form-control" id="work-deadline" type="datetime-local" placeholder="Deadline">
                            <label>Deadline</label>
                        </div>
                        <label class="mt-3"><strong>Mô tả nội dung tiến độ</strong></label>
                        <textarea id="contentTienDo" name="contentTienDo"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button onclick="addWork()" type="button" class="btn btn-primary">Lưu</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.tiny.cloud/1/f6s0gxhkpepxkws8jawvfwtj0l9lv0xjgq1swbv4lgcy3au3/tinymce/5/tinymce.min.js" referrerpolicy="origin"></script>
    <script>
        tinymce.init({
            selector: 'textarea#contentTienDo', // Chọn textarea có id là 'editor'
            // Tăng cường các plugin để hỗ trợ nhiều chức năng hơn
            plugins: 'advlist autolink lists link image charmap print preview hr anchor pagebreak ' +
                'searchreplace wordcount visualblocks visualchars code fullscreen insertdatetime media nonbreaking ' +
                'table emoticons template paste codesample help',
            // Định nghĩa các nút trên thanh công cụ. Chia thành nhiều dòng để dễ quản lý.
            toolbar: 'undo redo | blocks | ' + // Hoàn tác, làm lại, và định dạng khối (Heading 1, 2, Paragraph,...)
                'bold italic underline strikethrough | forecolor backcolor | ' + // Định dạng chữ: đậm, nghiêng, gạch chân, gạch ngang, màu chữ, màu nền
                'alignleft aligncenter alignright alignjustify | outdent indent | ' + // Căn lề, lùi dòng
                'numlist bullist | link image media table | ' + // Danh sách số, danh sách dấu chấm, chèn liên kết, ảnh, video, bảng
                'charmap emoticons | fullscreen code preview | help', // Ký tự đặc biệt, biểu tượng cảm xúc, chế độ toàn màn hình, xem trước, mã nguồn, trợ giúp
            height: 600, // Tăng chiều cao của trình soạn thảo
            menubar: 'file edit view insert format tools table help', // Hiện thêm menu bar ở trên cùng
            images_upload_handler: async function (blobInfo, success, failure) {
                const formData = new FormData();
                formData.append('file', blobInfo.blob(), blobInfo.filename());

                const res = await fetch('http://localhost:8080/api/public/upload-file', {
                    method: 'POST',
                    body: formData
                });
                if (res.status < 300) {
                    var linkImage = await res.text();
                    success(linkImage);
                }
            }
        });
    </script>

</div>
</body>
</html>
