<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:include="common/user/libuser :: libheader"></th:block>
  <script src="/teacher/js/request.js"></script>
  <script src="/teacher/js/work.js"></script>
</head>
<body>

<div th:replace="common/teacher/headerUser :: headerUser"></div>

<div class="account-layout content-page-main">
  <div th:replace="common/teacher/sidebarTeacher :: sidebarMain"></div>

  <div class="account-content">
    <div class="account-content-inner">
      <div class="row">
        <div class="col-sm-5">
          <div class="project-info-card">
            <div class="project-info-header">
              <div class="project-title">
                <div class="d-flex mb-3">
                  <a th:href="'/teacher/project-detail/'+${semesterTeacherId}+'#tab1'" class="btn btn-sm btn-outline-primary"><i class="bi bi-arrow-left"></i> Quay lại</a>
                  <h4 th:if="${semesterTeacher.projectName != null && semesterTeacher.projectName != ''}" class="ms-4"><th:block th:text="${semesterTeacher.projectName}"></th:block></h4>
                </div>
                <span class="badge bg-success"
                      th:if="${semesterTeacher.semesterType.semester.endDate.after(#dates.createNow())}">
                Đang thực hiện
            </span>
                <span class="badge bg-error"
                      th:if="${semesterTeacher.semesterType.semester.endDate.before(#dates.createNow())}">
                Đã kết thúc
            </span>
                <span th:if="${semesterTeacher.semesterType.type.name=='TAI_TRUONG'}" class="badge bg-primary">Nhóm thực tập tại trường</span>
                <span th:if="${semesterTeacher.semesterType.type.name=='DOANH_NGHIEP_LIEN_KET'}" class="badge bg-primary">Nhóm công ty liên kết</span>
                <span th:if="${semesterTeacher.semesterType.type.name=='DOANH_NGHIEP_NGOAI'}" class="badge bg-primary">Nhóm doanh nghiệp ngoài</span>
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-7">
          <div class="dashboard-header">
            <img th:src="${studentRegis.student.avatar == null ? '/image/default-avatar.jpg' : studentRegis.student.avatar}">

            <div>
              <h4 th:text="${studentRegis.student.fullname}"></h4>
              <p th:text="${studentRegis.student.code}"></p>
            </div>

            <div class="score-box">
              <span>Điểm</span>
              <h2 th:text="${totalScore != null ? totalScore : 'N/A'}"></h2>
            </div>
          </div>
        </div>
      </div>
      <div class="account-tabs-containers">
        <div class="dashboard-stats">

          <div class="stat-card success">
            <h3 th:text="${onTimeCount}"></h3>
            <p>Đúng hạn</p>
          </div>

          <div class="stat-card warning">
            <h3 th:text="${lateCount}"></h3>
            <p>Nộp muộn</p>
          </div>

          <div class="stat-card danger">
            <h3 th:text="${notSubmitWork}"></h3>
            <p>Chưa nộp tiến độ</p>
          </div>

          <div class="stat-card dark">
            <h3 th:text="${notSubmitDoc}"></h3>
            <p>Chưa nộp tài liệu</p>
          </div>

        </div>

        <div class="dashboard-section">
          <h5>Tiến độ công việc</h5>

          <div th:each="wp : ${workList}" class="student-item">
            <div class="student-row">
              <div>
                <b th:text="${wp.workProcess.title}"></b>
                <div th:text="${#temporals.format(wp.createdDate, 'dd/MM/yyyy HH:mm')}"></div>
              </div>

              <span class="badge bg-warning"
                    th:if="${wp.createdDate.isAfter(wp.workProcess.deadline)}">
                Muộn
              </span>

              <span class="badge bg-success"
                    th:if="${!wp.createdDate.isAfter(wp.workProcess.deadline)}">
                Đúng hạn
              </span>
            </div>
          </div>
        </div>


        <div class="dashboard-section mt-5">
          <h5>Giấy tờ đã nộp</h5>

          <div th:each="d : ${docList}" class="student-item">
            <div class="student-row">
              <div>
                <b th:text="${d.relatedDocuments.name}"></b>
                <div th:text="${#temporals.format(d.createdDate, 'dd/MM/yyyy HH:mm')}"></div>
              </div>

              <a th:href="${d.fileUrl}" target="_blank" class="btn btn-sm btn-outline-primary">
                Xem
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div th:replace="common/user/footeruser :: footerMain"></div>
</body>
</html>
